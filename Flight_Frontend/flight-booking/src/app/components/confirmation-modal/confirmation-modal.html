<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-black/50 backdrop-blur-sm"
    (click)="cancel.emit()">
    <div class="w-full max-w-sm modal-content card p-6" (click)="$event.stopPropagation()">
        <div class="text-center">
            <div class="w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center"
                [class]="isDanger ? 'bg-red-100 dark:bg-red-950' : 'bg-amber-100 dark:bg-amber-950'">
                <svg class="w-7 h-7" [class]="isDanger ? 'text-red-500' : 'text-amber-500'" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="font-display font-bold text-lg text-slate-900 dark:text-white mb-2">{{ title }}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">{{ message }}</p>
            <div class="flex gap-3">
                <button (click)="cancel.emit()" class="btn-secondary flex-1">Cancel</button>
                <button (click)="confirm.emit()" [class]="isDanger ? 'btn-danger flex-1' : 'btn-primary flex-1'">{{
                    confirmLabel }}</button>
            </div>
        </div>
    </div>
</div>
