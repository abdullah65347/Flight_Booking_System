<div class="fixed top-20 right-4 z-[100] flex flex-col gap-2 max-w-sm w-full pointer-events-none">
    @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast-enter pointer-events-auto card flex items-start gap-3 p-4 shadow-lg"
        [class]="getClass(toast.type)">
        <div class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center" [class]="getIconBg(toast.type)">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="getIcon(toast.type)" />
            </svg>
        </div>
        <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-slate-900 dark:text-white">{{ toast.title }}</p>
            @if (toast.message) {
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 truncate">{{ toast.message }}</p>
            }
        </div>
        <button (click)="toastService.remove(toast.id)"
            class="flex-shrink-0 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    }
</div>
