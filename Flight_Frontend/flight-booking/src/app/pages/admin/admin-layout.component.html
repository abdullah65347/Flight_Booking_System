<div class="min-h-screen bg-slate-50 dark:bg-dark-950 flex">
    <aside
        class="w-64 bg-white dark:bg-dark-900 border-r border-slate-200 dark:border-slate-700/50 flex flex-col fixed h-full left-0 top-0 z-30 pt-16">
        <div class="p-4 border-b border-slate-100 dark:border-slate-700/50">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Admin Panel</span>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            @for (item of navItems; track item.label) {
            <a [routerLink]="item.path"
                routerLinkActive="bg-brand-50 dark:bg-brand-950/50 text-brand-600 dark:text-brand-400"
                [routerLinkActiveOptions]="{ exact: item.exact }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-all">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
                </svg>
                {{ item.label }}
            </a>
            }
        </nav>
        <div class="p-4 border-t border-slate-100 dark:border-slate-700/50">
            <button (click)="auth.logout()"
                class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-950 w-full transition-all">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </button>
        </div>
    </aside>
    <div class="flex-1 ml-64">
        <router-outlet />
    </div>
</div>
